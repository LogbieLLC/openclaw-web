<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jun 🥷</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-dim: #4a3fa0;
      --user-bg: #2a2060;
      --assistant-bg: #1e1e1e;
      --send-bg: #7c6af7;
      --send-hover: #6a59e0;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #header .info h1 {
      font-size: 16px;
      font-weight: 600;
    }

    #header .info .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    #header .info .status::before {
      content: '● ';
      color: #4caf50;
      font-size: 10px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Input area */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--send-bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: var(--send-hover); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    #empty-state .icon { font-size: 48px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="avatar">🥷</div>
      <div class="info">
        <h1>Jun Suzuki</h1>
        <div class="status">online</div>
      </div>
    </div>

    <div id="messages">
      <div id="empty-state">
        <div class="icon">🥷</div>
        <strong>Jun Suzuki</strong>
        <span>Say something. I'll respond.</span>
      </div>
    </div>

    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Message Jun…"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const emptyState = document.getElementById('empty-state');

    let history = [];
    let busy = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function appendMessage(role, text) {
      if (emptyState) emptyState.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Jun';
      div.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      messagesEl.appendChild(div);
      scrollBottom();
      return bubble;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="label">Jun</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, sessionId }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json();
          appendMessage('assistant', '⚠️ Error: ' + (err.error || res.status));
          busy = false;
          sendBtn.disabled = false;
          return;
        }

        const bubble = appendMessage('assistant', '');
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const obj = JSON.parse(data);
              const delta = obj.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                bubble.textContent = fullText;
                scrollBottom();
              }
            } catch {}
          }
        }

        if (fullText) history.push({ role: 'assistant', content: fullText });

      } catch (err) {
        removeTyping();
        appendMessage('assistant', '⚠️ Connection error: ' + err.message);
      }

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>

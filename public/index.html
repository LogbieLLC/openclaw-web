<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jun 🥷</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-dim: #4a3fa0;
      --user-bg: #2a2060;
      --assistant-bg: #1e1e1e;
      --send-bg: #7c6af7;
      --send-hover: #6a59e0;
      --sidebar-w: 220px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Layout */
    #layout {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #new-chat-btn {
      margin: 12px;
      padding: 10px 0;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #new-chat-btn:hover { background: var(--send-hover); }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #conversations::-webkit-scrollbar { width: 4px; }
    #conversations::-webkit-scrollbar-track { background: transparent; }
    #conversations::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }

    .conv-item:hover { background: var(--surface2); }
    .conv-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .conv-item .conv-info {
      flex: 1;
      min-width: 0;
      margin-right: 6px;
    }

    .conv-item .conv-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item .conv-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .conv-item .conv-delete {
      width: 22px;
      height: 22px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s, color 0.1s;
    }

    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-item .conv-delete:hover { background: rgba(255,255,255,0.08); color: #f44; }

    #sidebar-empty {
      padding: 20px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Sidebar toggle for mobile */
    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* Chat panel */
    #app {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #header .info h1 {
      font-size: 16px;
      font-weight: 600;
    }

    #header .info .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    #header .info .status::before {
      content: '● ';
      color: #4caf50;
      font-size: 10px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Input area */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--send-bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: var(--send-hover); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    #empty-state .icon { font-size: 48px; margin-bottom: 8px; }

    /* ── Secrets modal ── */
    #secrets-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    #secrets-overlay.open { display: flex; }

    #secrets-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      animation: slideUp 0.18s ease;
      max-height: 65vh;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 520px) {
      #secrets-overlay { align-items: center; }
      #secrets-modal {
        border-radius: 14px;
        margin-bottom: 0;
        max-height: 70vh;
      }
    }

    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #secrets-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #secrets-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #secrets-close {
      width: 26px;
      height: 26px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    #secrets-close:hover { background: var(--surface2); color: var(--text); }

    #secrets-hint {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #secrets-list {
      overflow-y: auto;
      padding: 6px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #secrets-list::-webkit-scrollbar { width: 4px; }
    #secrets-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .secret-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      color: var(--text);
      width: 100%;
    }

    .secret-item .si-icon { font-size: 14px; flex-shrink: 0; }
    .secret-item .si-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .secret-item .si-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .si-action-btn {
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .si-action-value {
      background: rgba(124, 106, 247, 0.2);
      border-color: rgba(124, 106, 247, 0.5);
      color: #c4baff;
    }
    .si-action-value:hover {
      background: rgba(124, 106, 247, 0.35);
      color: #fff;
    }

    .si-action-ref {
      background: transparent;
      border-color: var(--border);
      border-style: dashed;
      color: var(--text-muted);
    }
    .si-action-ref:hover {
      border-color: rgba(124, 106, 247, 0.4);
      color: var(--text);
    }

    #secrets-empty {
      padding: 20px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    #secrets-empty a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Add-secret section ── */
    #secrets-add-section {
      border-top: 1px solid var(--border);
      padding: 10px 10px 14px;
      flex-shrink: 0;
    }

    #secrets-add-toggle {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    #secrets-add-toggle:hover { border-color: var(--accent); color: var(--text); }

    #secrets-add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .saf-row {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .saf-prefix {
      padding: 0 8px;
      font-size: 12px;
      font-family: monospace;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      user-select: none;
    }

    #saf-name {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 9px 10px 9px 0;
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      width: 100%;
    }

    #saf-value {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    #saf-value:focus { border-color: var(--accent); }

    .saf-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .saf-actions button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    #saf-cancel {
      background: var(--surface2);
      color: var(--text-muted);
    }
    #saf-cancel:hover { color: var(--text); background: var(--border); }

    #saf-save {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    #saf-save:hover { background: var(--send-hover); }
    #saf-save:disabled { opacity: 0.5; cursor: not-allowed; }

    #saf-error {
      font-size: 12px;
      color: #f66;
      padding: 2px 4px;
    }

    /* Secret lock button */
    #secret-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      align-self: flex-end;
      font-size: 16px;
    }

    #secret-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    /* Secret token chip — name + value */
    .secret-token {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 7px;
      background: rgba(124, 106, 247, 0.18);
      border: 1px solid rgba(124, 106, 247, 0.4);
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      color: #a89fff;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* Name-only reference chip — dimmer, dashed border */
    .secret-token-ref {
      background: transparent;
      border-style: dashed;
      border-color: rgba(124, 106, 247, 0.3);
      color: #7a6fc0;
    }

    /* Attachment button */
    #attach-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      align-self: flex-end;
      color: var(--text-muted);
    }

    #attach-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--text);
    }

    #attach-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* Attachment preview strip */
    #attachment-strip {
      display: none;
      gap: 8px;
      padding: 8px 16px 0;
      background: var(--surface);
      flex-wrap: wrap;
    }

    #attachment-strip.has-items { display: flex; }

    .att-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text);
      max-width: 200px;
      animation: fadeIn 0.15s ease;
    }

    .att-chip .att-thumb {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .att-chip .att-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .att-chip .att-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .att-chip .att-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
      border-radius: 4px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .att-chip .att-remove:hover { color: #f44; background: rgba(255,255,255,0.08); }

    /* Responsive */
    @media (max-width: 600px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 90;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-toggle { display: flex; }
      #header { padding-left: 52px; }
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

  <div id="layout">
    <aside id="sidebar">
      <button id="new-chat-btn">+ New Chat</button>
      <div id="conversations"></div>
    </aside>

    <div id="app">
      <div id="header">
        <div class="avatar">🥷</div>
        <div class="info">
          <h1>Jun Suzuki</h1>
          <div class="status">online</div>
        </div>
      </div>

      <div id="messages">
        <div id="empty-state">
          <div class="icon">🥷</div>
          <strong>Jun Suzuki</strong>
          <span>Say something. I'll respond.</span>
        </div>
      </div>

      <!-- Secrets modal -->
      <div id="secrets-overlay" role="dialog" aria-modal="true" aria-label="Insert secret">
        <div id="secrets-modal">
          <div id="secrets-header">
            <h2>🔒 Secrets</h2>
            <button id="secrets-close" title="Close" aria-label="Close">×</button>
          </div>
          <p id="secrets-hint">Click a variable to insert it at your cursor. The actual value is never shown in chat.</p>
          <div id="secrets-list"></div>

          <!-- Add new secret -->
          <div id="secrets-add-section">
            <button id="secrets-add-toggle" type="button">＋ Add new secret</button>
            <div id="secrets-add-form" hidden>
              <div class="saf-row">
                <span class="saf-prefix">SECRET_</span>
                <input id="saf-name" type="text" placeholder="VAR_NAME" autocomplete="off" spellcheck="false" />
              </div>
              <input id="saf-value" type="password" placeholder="Secret value" autocomplete="new-password" />
              <div class="saf-actions">
                <button id="saf-cancel" type="button">Cancel</button>
                <button id="saf-save" type="button">Save</button>
              </div>
              <div id="saf-error" hidden></div>
            </div>
          </div>
        </div>
      </div>

      <input type="file" id="file-input" hidden multiple
        accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.txt,.md,.csv,.json,image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain,text/markdown,text/csv,application/json" />
      <div id="attachment-strip"></div>
      <div id="input-area">
        <button id="attach-btn" title="Attach file">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.5 6v11.5a4 4 0 0 1-8 0V5a2.5 2.5 0 0 1 5 0v10.5a1 1 0 0 1-2 0V6h-1.5v9.5a2.5 2.5 0 0 0 5 0V5a4 4 0 0 0-8 0v12.5a5.5 5.5 0 0 0 11 0V6H16.5z"/>
          </svg>
        </button>
        <button id="secret-btn" title="Insert secret">🔒</button>
        <textarea id="input" rows="1" placeholder="Message Jun…"></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── CSRF helpers ──
    let csrfToken = '';

    function getCookieValue(name) {
      const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return match ? match.pop() : '';
    }

    async function initCsrf() {
      // Prefer cookie (already set by server); fall back to endpoint
      csrfToken = getCookieValue('csrf_token');
      if (!csrfToken) {
        try {
          const r = await fetch('/api/csrf-token');
          const data = await r.json();
          csrfToken = data.token || getCookieValue('csrf_token');
        } catch (e) {
          console.warn('Could not fetch CSRF token:', e);
        }
      }
    }

    // ── DOM refs ──
    const messagesEl    = document.getElementById('messages');
    const inputEl       = document.getElementById('input');
    const sendBtn       = document.getElementById('send-btn');
    const attachBtn     = document.getElementById('attach-btn');
    const fileInput     = document.getElementById('file-input');
    const attStrip      = document.getElementById('attachment-strip');
    const convListEl    = document.getElementById('conversations');
    const newChatBtn    = document.getElementById('new-chat-btn');
    const sidebarEl     = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');

    // ── State ──
    const STORE_KEY = 'jun_conversations';
    let conversations  = loadConversations();
    let currentId      = null;
    let history        = [];
    let busy           = false;
    let pendingFiles   = []; // { file: File, previewUrl?: string }

    // ── LocalStorage helpers ──
    function loadConversations() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function saveConversations() {
      localStorage.setItem(STORE_KEY, JSON.stringify(conversations));
    }

    function getConv(id) {
      return conversations.find(c => c.id === id);
    }

    // ── Generate session ID ──
    function newSessionId() {
      return 'web-' + Math.random().toString(36).slice(2, 10);
    }

    // ── Sidebar rendering ──
    function renderSidebar() {
      convListEl.innerHTML = '';

      if (conversations.length === 0) {
        convListEl.innerHTML = '<div id="sidebar-empty">No conversations yet</div>';
        return;
      }

      // Show newest first
      const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);

      for (const conv of sorted) {
        const item = document.createElement('div');
        item.className = 'conv-item' + (conv.id === currentId ? ' active' : '');

        const info = document.createElement('div');
        info.className = 'conv-info';

        const title = document.createElement('div');
        title.className = 'conv-title';
        title.textContent = conv.title || 'New chat';

        const time = document.createElement('div');
        time.className = 'conv-time';
        time.textContent = formatTime(conv.updatedAt);

        info.appendChild(title);
        info.appendChild(time);
        item.appendChild(info);

        const del = document.createElement('button');
        del.className = 'conv-delete';
        del.textContent = '×';
        del.title = 'Delete';
        del.addEventListener('click', e => {
          e.stopPropagation();
          deleteConversation(conv.id);
        });
        item.appendChild(del);

        item.addEventListener('click', () => loadConversation(conv.id));
        convListEl.appendChild(item);
      }
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // ── Conversation CRUD ──
    function startNewChat() {
      currentId = newSessionId();
      history = [];

      conversations.push({
        id: currentId,
        title: '',
        messages: [],
        createdAt: Date.now(),
        updatedAt: Date.now(),
      });

      saveConversations();
      clearMessages();
      renderSidebar();
      inputEl.focus();
      closeSidebarMobile();
    }

    function loadConversation(id) {
      const conv = getConv(id);
      if (!conv) return;

      currentId = id;
      history = conv.messages.map(m => ({ role: m.role, content: m.content }));

      clearMessages();
      for (const msg of conv.messages) {
        appendMessage(msg.role, msg.content, true);
      }

      renderSidebar();
      scrollBottom();
      inputEl.focus();
      closeSidebarMobile();
    }

    function deleteConversation(id) {
      conversations = conversations.filter(c => c.id !== id);
      saveConversations();

      if (id === currentId) {
        if (conversations.length > 0) {
          const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
          loadConversation(sorted[0].id);
        } else {
          startNewChat();
        }
      } else {
        renderSidebar();
      }
    }

    function saveCurrentConversation() {
      const conv = getConv(currentId);
      if (!conv) return;

      conv.messages = history.map(m => ({ role: m.role, content: m.content }));
      conv.updatedAt = Date.now();

      // Auto-title from first user message
      if (!conv.title) {
        const first = history.find(m => m.role === 'user');
        if (first) {
          const raw = first.content.replace(/\s+/g, ' ').trim();
          conv.title = raw.length > 30 ? raw.slice(0, 30) + '…' : raw;
        }
      }

      saveConversations();
      renderSidebar();
    }

    // ── Chat UI helpers ──
    function clearMessages() {
      messagesEl.innerHTML = '';
      if (history.length === 0) {
        const empty = document.createElement('div');
        empty.id = 'empty-state';
        empty.innerHTML = `
          <div class="icon">🥷</div>
          <strong>Jun Suzuki</strong>
          <span>Say something. I'll respond.</span>
        `;
        messagesEl.appendChild(empty);
      }
    }

    // Render text with {{SECRET_VAR}} and {SECRET_VAR} replaced by visual chips.
    // {{VAR}} → filled chip (name + value sent)
    // {VAR}   → outlined chip (name-only reference)
    // Matches double-brace first so {{VAR}} is never partially consumed by {VAR}.
    const SECRET_DISPLAY_RE = /\{\{([A-Z][A-Z0-9_]*)\}\}|\{([A-Z][A-Z0-9_]*)\}/g;

    function renderWithSecrets(bubble, text) {
      const parts = [];
      let last = 0;
      let m;
      SECRET_DISPLAY_RE.lastIndex = 0;
      while ((m = SECRET_DISPLAY_RE.exec(text)) !== null) {
        if (m.index > last) parts.push({ type: 'text', value: text.slice(last, m.index) });
        const isDouble = Boolean(m[1]);
        parts.push({ type: 'secret', name: m[1] || m[2], withValue: isDouble });
        last = m.index + m[0].length;
      }
      if (last < text.length) parts.push({ type: 'text', value: text.slice(last) });

      bubble.textContent = '';
      for (const part of parts) {
        if (part.type === 'text') {
          bubble.appendChild(document.createTextNode(part.value));
        } else {
          const chip = document.createElement('span');
          chip.className = 'secret-token' + (part.withValue ? '' : ' secret-token-ref');
          chip.title = part.withValue
            ? `Secret: ${part.name} — name + value sent to Jun`
            : `Secret reference: ${part.name} — name only (value stays here)`;
          chip.textContent = `🔒 ${part.name}`;
          bubble.appendChild(chip);
        }
      }
    }

    function appendMessage(role, text, silent) {
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (silent) div.style.animation = 'none';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Jun';
      div.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (role === 'user') {
        renderWithSecrets(bubble, text);
      } else {
        bubble.textContent = text;
      }
      div.appendChild(bubble);

      messagesEl.appendChild(div);
      scrollBottom();
      return bubble;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="label">Jun</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Auto-resize textarea ──
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Send on Enter ──
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Attachment handling ──
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      for (const file of fileInput.files) {
        const entry = { file };
        if (file.type.startsWith('image/')) {
          entry.previewUrl = URL.createObjectURL(file);
        }
        pendingFiles.push(entry);
      }
      fileInput.value = '';
      renderAttachmentStrip();
    });

    function renderAttachmentStrip() {
      attStrip.innerHTML = '';
      if (pendingFiles.length === 0) {
        attStrip.classList.remove('has-items');
        return;
      }
      attStrip.classList.add('has-items');

      pendingFiles.forEach((entry, idx) => {
        const chip = document.createElement('div');
        chip.className = 'att-chip';

        if (entry.previewUrl) {
          const thumb = document.createElement('img');
          thumb.className = 'att-thumb';
          thumb.src = entry.previewUrl;
          thumb.alt = entry.file.name;
          chip.appendChild(thumb);
        } else {
          const icon = document.createElement('span');
          icon.className = 'att-icon';
          icon.textContent = '\uD83D\uDCC4';
          chip.appendChild(icon);
        }

        const name = document.createElement('span');
        name.className = 'att-name';
        name.textContent = entry.file.name;
        chip.appendChild(name);

        const rm = document.createElement('button');
        rm.className = 'att-remove';
        rm.textContent = '\u00D7';
        rm.title = 'Remove';
        rm.addEventListener('click', () => {
          if (entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
          pendingFiles.splice(idx, 1);
          renderAttachmentStrip();
        });
        chip.appendChild(rm);

        attStrip.appendChild(chip);
      });
    }

    async function uploadFiles() {
      const results = [];
      for (const entry of pendingFiles) {
        const form = new FormData();
        form.append('file', entry.file);
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'X-CSRF-Token': csrfToken },
          body: form,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(err.error || 'Upload failed');
        }
        results.push(await res.json());
      }
      return results;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if ((!text && pendingFiles.length === 0) || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Upload attachments first
      let attachments = [];
      const hadFiles = pendingFiles.length > 0;
      if (hadFiles) {
        try {
          const uploaded = await uploadFiles();
          attachments = uploaded.map(u => ({
            fileId: u.fileId,
            name: u.name,
            mimeType: u.type,
            data: u.data,
          }));
        } catch (err) {
          appendMessage('assistant', '\u26A0\uFE0F Upload error: ' + err.message);
          busy = false;
          sendBtn.disabled = false;
          return;
        }
        // Clean up previews
        pendingFiles.forEach(e => { if (e.previewUrl) URL.revokeObjectURL(e.previewUrl); });
        pendingFiles = [];
        renderAttachmentStrip();
      }

      // Build display text (show filenames if attached)
      const displayText = hadFiles
        ? (text || '') + (attachments.length ? '\n\uD83D\uDCCE ' + attachments.map(a => a.name).join(', ') : '')
        : text;

      appendMessage('user', displayText.trim());
      history.push({ role: 'user', content: text || '(see attached files)' });

      showTyping();

      try {
        const body = { messages: history, sessionId: currentId };
        if (attachments.length > 0) body.attachments = attachments;

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
          },
          body: JSON.stringify(body),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json();
          appendMessage('assistant', '⚠️ Error: ' + (err.error || res.status));
          busy = false;
          sendBtn.disabled = false;
          return;
        }

        const bubble = appendMessage('assistant', '');
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const obj = JSON.parse(data);
              const delta = obj.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                bubble.textContent = fullText;
                scrollBottom();
              }
            } catch {}
          }
        }

        if (fullText) {
          history.push({ role: 'assistant', content: fullText });
          saveCurrentConversation();
        }

      } catch (err) {
        removeTyping();
        appendMessage('assistant', '⚠️ Connection error: ' + err.message);
      }

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ── Sidebar toggle (mobile) ──
    sidebarToggle.addEventListener('click', () => {
      sidebarEl.classList.toggle('open');
    });

    function closeSidebarMobile() {
      sidebarEl.classList.remove('open');
    }

    // ── New Chat button ──
    newChatBtn.addEventListener('click', startNewChat);

    // ── Secrets modal ──
    const secretsOverlay = document.getElementById('secrets-overlay');
    const secretsList    = document.getElementById('secrets-list');
    const secretsClose   = document.getElementById('secrets-close');
    const secretBtn      = document.getElementById('secret-btn');

    function renderSecretsList(secrets) {
      secretsList.innerHTML = '';
      if (!secrets || secrets.length === 0) {
        const empty = document.createElement('div');
        empty.id = 'secrets-empty';
        empty.innerHTML = 'No secrets yet.<br>Add one below ↓';
        secretsList.appendChild(empty);
        return;
      }
      for (const name of secrets) {
        const row = document.createElement('div');
        row.className = 'secret-item';

        const icon = document.createElement('span');
        icon.className = 'si-icon';
        icon.textContent = '🔒';
        row.appendChild(icon);

        const label = document.createElement('span');
        label.className = 'si-name';
        label.textContent = name;
        row.appendChild(label);

        const actions = document.createElement('span');
        actions.className = 'si-actions';

        const btnValue = document.createElement('button');
        btnValue.className = 'si-action-btn si-action-value';
        btnValue.textContent = '+ value';
        btnValue.title = 'Insert name + value — Jun sees both';
        btnValue.addEventListener('click', () => insertSecret(`{{${name}}}`));
        actions.appendChild(btnValue);

        const btnName = document.createElement('button');
        btnName.className = 'si-action-btn si-action-ref';
        btnName.textContent = 'name only';
        btnName.title = 'Insert name reference — Jun sees the label, not the value';
        btnName.addEventListener('click', () => insertSecret(`{${name}}`));
        actions.appendChild(btnName);

        row.appendChild(actions);
        secretsList.appendChild(row);
      }
    }

    function openSecretsModal() {
      secretsList.innerHTML = '<div style="color:var(--text-muted);padding:20px 16px;text-align:center;font-size:13px;">Loading…</div>';
      hideAddForm();
      secretsOverlay.classList.add('open');

      fetch('/api/secrets', {
        headers: {
          'X-CSRF-Token': csrfToken,
          'X-Requested-With': 'XMLHttpRequest',
        },
      })
        .then(r => r.json())
        .then(({ secrets }) => renderSecretsList(secrets))
        .catch(() => {
          secretsList.innerHTML = '<div style="color:#f66;padding:20px 16px;text-align:center;font-size:13px;">⚠️ Could not load secrets</div>';
        });
    }

    function closeSecretsModal() {
      secretsOverlay.classList.remove('open');
      hideAddForm();
    }

    function insertSecret(token) {
      const start = inputEl.selectionStart;
      const end   = inputEl.selectionEnd;
      const val   = inputEl.value;
      inputEl.value = val.slice(0, start) + token + val.slice(end);
      // Move cursor after inserted token
      const pos = start + token.length;
      inputEl.setSelectionRange(pos, pos);
      // Trigger auto-resize
      inputEl.dispatchEvent(new Event('input'));
      closeSecretsModal();
      inputEl.focus();
    }

    secretBtn.addEventListener('click', openSecretsModal);
    secretsClose.addEventListener('click', closeSecretsModal);
    // Close on backdrop click (not the modal itself)
    secretsOverlay.addEventListener('click', e => {
      if (e.target === secretsOverlay) closeSecretsModal();
    });
    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && secretsOverlay.classList.contains('open')) {
        closeSecretsModal();
      }
    });

    // ── Add-secret form ──
    const addToggle  = document.getElementById('secrets-add-toggle');
    const addForm    = document.getElementById('secrets-add-form');
    const safName    = document.getElementById('saf-name');
    const safValue   = document.getElementById('saf-value');
    const safSave    = document.getElementById('saf-save');
    const safCancel  = document.getElementById('saf-cancel');
    const safError   = document.getElementById('saf-error');

    function showAddForm() {
      addForm.hidden = false;
      addToggle.hidden = true;
      safName.value = '';
      safValue.value = '';
      safError.hidden = true;
      safError.textContent = '';
      safName.focus();
    }

    function hideAddForm() {
      addForm.hidden = true;
      addToggle.hidden = false;
    }

    // Auto-uppercase the name field
    safName.addEventListener('input', () => {
      const pos = safName.selectionStart;
      safName.value = safName.value.toUpperCase().replace(/[^A-Z0-9_]/g, '');
      safName.setSelectionRange(pos, pos);
    });

    addToggle.addEventListener('click', showAddForm);
    safCancel.addEventListener('click', hideAddForm);

    safSave.addEventListener('click', async () => {
      const name  = ('SECRET_' + safName.value.trim()).replace(/SECRET_SECRET_/, 'SECRET_'); // guard against double-prefix
      const value = safValue.value;

      if (!safName.value.trim()) {
        safError.textContent = 'Name is required.';
        safError.hidden = false;
        return;
      }
      if (!value) {
        safError.textContent = 'Value is required.';
        safError.hidden = false;
        return;
      }

      safSave.disabled = true;
      safError.hidden = true;

      try {
        const res = await fetch('/api/secrets', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
            'X-Requested-With': 'XMLHttpRequest',
          },
          body: JSON.stringify({ name, value }),
        });

        const data = await res.json();
        if (!res.ok) {
          safError.textContent = data.error || 'Save failed.';
          safError.hidden = false;
          return;
        }

        // Success — collapse form, refresh list
        hideAddForm();
        // Re-fetch list to show newly added secret
        fetch('/api/secrets', {
          headers: { 'X-CSRF-Token': csrfToken, 'X-Requested-With': 'XMLHttpRequest' },
        })
          .then(r => r.json())
          .then(({ secrets }) => renderSecretsList(secrets))
          .catch(() => {});

      } catch (err) {
        safError.textContent = 'Network error: ' + err.message;
        safError.hidden = false;
      } finally {
        safSave.disabled = false;
      }
    });

    // Enter key in value field → save
    safValue.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); safSave.click(); }
    });

    // ── Init: restore last conversation or start fresh ──
    (async function init() {
      await initCsrf();
      if (conversations.length > 0) {
        // Remove empty conversations with no messages (stale new chats)
        conversations = conversations.filter(c => c.messages.length > 0);
        saveConversations();
      }

      if (conversations.length > 0) {
        const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
        loadConversation(sorted[0].id);
      } else {
        startNewChat();
      }
    })();

    // ── Health-check poller: auto-reload on backend restart ──
    (function healthPoller() {
      let serverState = 'up';
      let banner = null;

      function showBanner() {
        if (banner) return;
        banner = document.createElement('div');
        banner.id = 'health-banner';
        banner.textContent = '\uD83D\uDD34 Server disconnected — reconnecting…';
        Object.assign(banner.style, {
          position: 'fixed',
          top: '0',
          left: '0',
          right: '0',
          zIndex: '9999',
          padding: '8px 16px',
          background: 'var(--surface)',
          borderBottom: '1px solid var(--border)',
          color: 'var(--text-muted)',
          fontSize: '13px',
          textAlign: 'center',
        });
        document.body.appendChild(banner);
      }

      function removeBanner() {
        if (banner) { banner.remove(); banner = null; }
      }

      async function poll() {
        try {
          const res = await fetch('/health');
          if (!res.ok) throw new Error('non-200');
          if (serverState === 'down') {
            window.location.reload();
            return;
          }
          serverState = 'up';
        } catch {
          serverState = 'down';
          showBanner();
        }
      }

      setInterval(poll, 3000);
    })();
  </script>
</body>

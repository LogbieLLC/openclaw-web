<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jun 🥷</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-dim: #4a3fa0;
      --user-bg: #2a2060;
      --assistant-bg: #1e1e1e;
      --send-bg: #7c6af7;
      --send-hover: #6a59e0;
      --sidebar-w: 220px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Layout */
    #layout {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #new-chat-btn {
      margin: 12px;
      padding: 10px 0;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #new-chat-btn:hover { background: var(--send-hover); }

    #conversations {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #conversations::-webkit-scrollbar { width: 4px; }
    #conversations::-webkit-scrollbar-track { background: transparent; }
    #conversations::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }

    .conv-item:hover { background: var(--surface2); }
    .conv-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .conv-item .conv-info {
      flex: 1;
      min-width: 0;
      margin-right: 6px;
    }

    .conv-item .conv-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item .conv-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .conv-item .conv-delete {
      width: 22px;
      height: 22px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s, color 0.1s;
    }

    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-item .conv-delete:hover { background: rgba(255,255,255,0.08); color: #f44; }

    #sidebar-empty {
      padding: 20px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Sidebar toggle for mobile */
    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* Chat panel */
    #app {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #header .info h1 {
      font-size: 16px;
      font-weight: 600;
    }

    #header .info .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    #header .info .status::before {
      content: '● ';
      color: #4caf50;
      font-size: 10px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Input area */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      background: var(--send-bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: var(--send-hover); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    #empty-state .icon { font-size: 48px; margin-bottom: 8px; }

    /* Responsive */
    @media (max-width: 600px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 90;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-toggle { display: flex; }
      #header { padding-left: 52px; }
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

  <div id="layout">
    <aside id="sidebar">
      <button id="new-chat-btn">+ New Chat</button>
      <div id="conversations"></div>
    </aside>

    <div id="app">
      <div id="header">
        <div class="avatar">🥷</div>
        <div class="info">
          <h1>Jun Suzuki</h1>
          <div class="status">online</div>
        </div>
      </div>

      <div id="messages">
        <div id="empty-state">
          <div class="icon">🥷</div>
          <strong>Jun Suzuki</strong>
          <span>Say something. I'll respond.</span>
        </div>
      </div>

      <div id="input-area">
        <textarea id="input" rows="1" placeholder="Message Jun…"></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── CSRF helpers ──
    let csrfToken = '';

    function getCookieValue(name) {
      const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return match ? match.pop() : '';
    }

    async function initCsrf() {
      // Prefer cookie (already set by server); fall back to endpoint
      csrfToken = getCookieValue('csrf_token');
      if (!csrfToken) {
        try {
          const r = await fetch('/api/csrf-token');
          const data = await r.json();
          csrfToken = data.token || getCookieValue('csrf_token');
        } catch (e) {
          console.warn('Could not fetch CSRF token:', e);
        }
      }
    }

    // ── DOM refs ──
    const messagesEl   = document.getElementById('messages');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');
    const convListEl   = document.getElementById('conversations');
    const newChatBtn   = document.getElementById('new-chat-btn');
    const sidebarEl    = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');

    // ── State ──
    const STORE_KEY = 'jun_conversations';
    let conversations = loadConversations();
    let currentId     = null;
    let history       = [];
    let busy          = false;

    // ── LocalStorage helpers ──
    function loadConversations() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function saveConversations() {
      localStorage.setItem(STORE_KEY, JSON.stringify(conversations));
    }

    function getConv(id) {
      return conversations.find(c => c.id === id);
    }

    // ── Generate session ID ──
    function newSessionId() {
      return 'web-' + Math.random().toString(36).slice(2, 10);
    }

    // ── Sidebar rendering ──
    function renderSidebar() {
      convListEl.innerHTML = '';

      if (conversations.length === 0) {
        convListEl.innerHTML = '<div id="sidebar-empty">No conversations yet</div>';
        return;
      }

      // Show newest first
      const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);

      for (const conv of sorted) {
        const item = document.createElement('div');
        item.className = 'conv-item' + (conv.id === currentId ? ' active' : '');

        const info = document.createElement('div');
        info.className = 'conv-info';

        const title = document.createElement('div');
        title.className = 'conv-title';
        title.textContent = conv.title || 'New chat';

        const time = document.createElement('div');
        time.className = 'conv-time';
        time.textContent = formatTime(conv.updatedAt);

        info.appendChild(title);
        info.appendChild(time);
        item.appendChild(info);

        const del = document.createElement('button');
        del.className = 'conv-delete';
        del.textContent = '×';
        del.title = 'Delete';
        del.addEventListener('click', e => {
          e.stopPropagation();
          deleteConversation(conv.id);
        });
        item.appendChild(del);

        item.addEventListener('click', () => loadConversation(conv.id));
        convListEl.appendChild(item);
      }
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // ── Conversation CRUD ──
    function startNewChat() {
      currentId = newSessionId();
      history = [];

      conversations.push({
        id: currentId,
        title: '',
        messages: [],
        createdAt: Date.now(),
        updatedAt: Date.now(),
      });

      saveConversations();
      clearMessages();
      renderSidebar();
      inputEl.focus();
      closeSidebarMobile();
    }

    function loadConversation(id) {
      const conv = getConv(id);
      if (!conv) return;

      currentId = id;
      history = conv.messages.map(m => ({ role: m.role, content: m.content }));

      clearMessages();
      for (const msg of conv.messages) {
        appendMessage(msg.role, msg.content, true);
      }

      renderSidebar();
      scrollBottom();
      inputEl.focus();
      closeSidebarMobile();
    }

    function deleteConversation(id) {
      conversations = conversations.filter(c => c.id !== id);
      saveConversations();

      if (id === currentId) {
        if (conversations.length > 0) {
          const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
          loadConversation(sorted[0].id);
        } else {
          startNewChat();
        }
      } else {
        renderSidebar();
      }
    }

    function saveCurrentConversation() {
      const conv = getConv(currentId);
      if (!conv) return;

      conv.messages = history.map(m => ({ role: m.role, content: m.content }));
      conv.updatedAt = Date.now();

      // Auto-title from first user message
      if (!conv.title) {
        const first = history.find(m => m.role === 'user');
        if (first) {
          const raw = first.content.replace(/\s+/g, ' ').trim();
          conv.title = raw.length > 30 ? raw.slice(0, 30) + '…' : raw;
        }
      }

      saveConversations();
      renderSidebar();
    }

    // ── Chat UI helpers ──
    function clearMessages() {
      messagesEl.innerHTML = '';
      if (history.length === 0) {
        const empty = document.createElement('div');
        empty.id = 'empty-state';
        empty.innerHTML = `
          <div class="icon">🥷</div>
          <strong>Jun Suzuki</strong>
          <span>Say something. I'll respond.</span>
        `;
        messagesEl.appendChild(empty);
      }
    }

    function appendMessage(role, text, silent) {
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (silent) div.style.animation = 'none';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Jun';
      div.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      messagesEl.appendChild(div);
      scrollBottom();
      return bubble;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="label">Jun</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Auto-resize textarea ──
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Send on Enter ──
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
          },
          body: JSON.stringify({ messages: history, sessionId: currentId }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json();
          appendMessage('assistant', '⚠️ Error: ' + (err.error || res.status));
          busy = false;
          sendBtn.disabled = false;
          return;
        }

        const bubble = appendMessage('assistant', '');
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const obj = JSON.parse(data);
              const delta = obj.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                bubble.textContent = fullText;
                scrollBottom();
              }
            } catch {}
          }
        }

        if (fullText) {
          history.push({ role: 'assistant', content: fullText });
          saveCurrentConversation();
        }

      } catch (err) {
        removeTyping();
        appendMessage('assistant', '⚠️ Connection error: ' + err.message);
      }

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ── Sidebar toggle (mobile) ──
    sidebarToggle.addEventListener('click', () => {
      sidebarEl.classList.toggle('open');
    });

    function closeSidebarMobile() {
      sidebarEl.classList.remove('open');
    }

    // ── New Chat button ──
    newChatBtn.addEventListener('click', startNewChat);

    // ── Init: restore last conversation or start fresh ──
    (async function init() {
      await initCsrf();
      if (conversations.length > 0) {
        // Remove empty conversations with no messages (stale new chats)
        conversations = conversations.filter(c => c.messages.length > 0);
        saveConversations();
      }

      if (conversations.length > 0) {
        const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
        loadConversation(sorted[0].id);
      } else {
        startNewChat();
      }
    })();

    // ── Health-check poller: auto-reload on backend restart ──
    (function healthPoller() {
      let serverState = 'up';
      let banner = null;

      function showBanner() {
        if (banner) return;
        banner = document.createElement('div');
        banner.id = 'health-banner';
        banner.textContent = '\uD83D\uDD34 Server disconnected — reconnecting…';
        Object.assign(banner.style, {
          position: 'fixed',
          top: '0',
          left: '0',
          right: '0',
          zIndex: '9999',
          padding: '8px 16px',
          background: 'var(--surface)',
          borderBottom: '1px solid var(--border)',
          color: 'var(--text-muted)',
          fontSize: '13px',
          textAlign: 'center',
        });
        document.body.appendChild(banner);
      }

      function removeBanner() {
        if (banner) { banner.remove(); banner = null; }
      }

      async function poll() {
        try {
          const res = await fetch('/health');
          if (!res.ok) throw new Error('non-200');
          if (serverState === 'down') {
            window.location.reload();
            return;
          }
          serverState = 'up';
        } catch {
          serverState = 'down';
          showBanner();
        }
      }

      setInterval(poll, 3000);
    })();
  </script>
</body>
</html>
